# =============================================================================
# Scheduled teardown pipeline
#
# Destroys ALL infrastructure managed by this Terraform configuration via
# `terraform destroy`, including App Service, Key Vault, VNet, private
# endpoints, and DNS zones — not just APIM and App Gateway.
#
# Runs automatically every night at 01:00 UTC (8 PM EST). Can also be
# triggered manually from the Azure DevOps pipeline UI (Run pipeline button)
# at any time.
#
# To restore: run azure-pipelines.yml to re-apply the full configuration
# from scratch.
# =============================================================================

trigger: none  # never runs on push — scheduled and manual only

schedules:
  - cron: '0 1 * * *'    # 01:00 UTC = 8 PM EST every day
    displayName: 'Nightly teardown (8 PM EST / 01:00 UTC)'
    branches:
      include:
        - main
    always: true          # run even if no code changes since last run

jobs:
  - job: Teardown
    displayName: 'Destroy all infrastructure'
    pool:
      vmImage: ubuntu-latest
    steps:
      - task: TerraformInstaller@1
        inputs:
          terraformVersion: '1.7.5'

      - task: TerraformTaskV4@4
        displayName: 'Terraform Init'
        inputs:
          provider: 'azurerm'
          command: 'init'
          workingDirectory: '$(System.DefaultWorkingDirectory)/infra'
          backendServiceArm: 'myapp-service-connection'
          backendAzureRmResourceGroupName: 'rg-tfstate'
          backendAzureRmStorageAccountName: 'stmyapptfstatesid'
          backendAzureRmContainerName: 'tfstate'
          backendAzureRmKey: 'myapp.terraform.tfstate'

      - task: TerraformTaskV4@4
        displayName: 'Terraform Destroy — tear down all infrastructure'
        inputs:
          provider: 'azurerm'
          command: 'destroy'
          workingDirectory: '$(System.DefaultWorkingDirectory)/infra'
          environmentServiceNameAzureRM: 'myapp-service-connection'
          commandOptions: '-auto-approve'

      # ── Purge Key Vault ─────────────────────────────────────────────────
      # terraform destroy soft-deletes the Key Vault — it does not purge it.
      # Azure enforces Key Vault soft delete unconditionally (no toggle to
      # disable it), so the vault name stays reserved for the retention
      # period unless purged. Without this step, tomorrow's terraform apply
      # would fail with "kv-myapp-sid already exists in deleted vault state."
      # Purging here guarantees every deploy starts from a truly clean slate.
      # || true — a no-op if the vault was never soft-deleted (e.g. destroy
      # partially failed before reaching Key Vault, or it didn't exist).
      - task: AzureCLI@2
        displayName: 'Purge soft-deleted Key Vault'
        condition: succeeded()
        inputs:
          azureSubscription: 'myapp-service-connection'
          scriptType: 'bash'
          scriptLocation: 'inlineScript'
          inlineScript: |
            az keyvault purge \
              --name kv-myapp-sid \
              --location eastus2 \
              || true

      # ── Delete tfstate backend ─────────────────────────────────────────
      # Explicit condition (not just relying on Azure Pipelines' default
      # succeeded() behavior) — only runs if Terraform Destroy above
      # succeeded. Deleting the state backend after everything it tracked
      # is gone makes every resource in this build fully ephemeral. The
      # deploy pipeline recreates this storage account before its own
      # Terraform Init runs, so this is safe — nothing else depends on it
      # surviving.
      - task: AzureCLI@2
        displayName: 'Delete tfstate backend'
        condition: succeeded()
        inputs:
          azureSubscription: 'myapp-service-connection'
          scriptType: 'bash'
          scriptLocation: 'inlineScript'
          inlineScript: |
            az storage account delete \
              --name stmyapptfstatesid \
              --resource-group rg-tfstate \
              --yes
