version: v0.1
testName: MyApp Full Load Test
testPlan: test-plan.jmx
description: Full load test — ramp-up 50 users over 60s, sustain 120s, ramp-down
engineInstances: 1
properties:
  userPropertyFile: ''
env:
  - name: target_host
    value: app-myapp-sid.azurewebsites.net
failureCriteria:
  - avg(response_time_ms) > 3000
  - percentage(error) > 5
