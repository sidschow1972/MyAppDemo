trigger:
  branches:
    include:
      - main

stages:
  - stage: Infrastructure
    jobs:
      - job: TerraformApply
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: TerraformInstaller@1
            inputs:
              terraformVersion: '1.7.5'
          - task: TerraformTaskV4@4
            displayName: 'Terraform Init'
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: '$(System.DefaultWorkingDirectory)/infra'
              backendServiceArm: 'myapp-service-connection'
              backendAzureRmResourceGroupName: 'rg-tfstate'
              backendAzureRmStorageAccountName: 'stmyapptfstatesid'
              backendAzureRmContainerName: 'tfstate'
              backendAzureRmKey: 'myapp.terraform.tfstate'
          - task: TerraformTaskV4@4
            displayName: 'Terraform Apply'
            inputs:
              provider: 'azurerm'
              command: 'apply'
              workingDirectory: '$(System.DefaultWorkingDirectory)/infra'
              environmentServiceNameAzureRM: 'myapp-service-connection'
              commandOptions: '-auto-approve'

  - stage: Build
    dependsOn: Infrastructure
    jobs:
      - job: BuildApp
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: DotNetCoreCLI@2
            inputs:
              command: 'publish'
              publishWebProjects: true
              projects: 'MyApp.Web/MyApp.Web.csproj'
              arguments: '--configuration Release --output $(Build.ArtifactStagingDirectory)'
          - publish: $(Build.ArtifactStagingDirectory)
            artifact: drop

  - stage: Deploy
    dependsOn: Build
    jobs:
      - deployment: DeployToProduction
        environment: 'production'
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: drop
                - task: AzureWebApp@1
                  inputs:
                    azureSubscription: 'myapp-service-connection'
                    appType: 'webAppLinux'
                    appName: 'app-myapp-sid'
                    package: '$(Pipeline.Workspace)/drop/**/*.zip'

  - stage: Validate
    dependsOn: Deploy
    jobs:
      - job: SmokeTest
        pool:
          vmImage: ubuntu-latest
        steps:
          - script: |
              curl -f https://app-myapp-sid.azurewebsites.net/health || exit 1
            displayName: 'Smoke test production'

  - stage: LoadTest
    dependsOn: Validate
    jobs:
      - job: RunLoadTest
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: AzureLoadTest@1
            displayName: 'Run full load test'
            inputs:
              azureSubscription: 'myapp-service-connection'
              loadTestConfigFile: 'loadtest/config.yaml'
              loadTestResource: 'lt-myapp-sid'
              resourceGroup: 'rg-myapp-prod'
