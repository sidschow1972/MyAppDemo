trigger:
  branches:
    include:
      - main

stages:
  - stage: Infrastructure
    jobs:
      - job: TerraformApply
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: AzureCLI@2
            displayName: 'Bootstrap Terraform state storage'
            inputs:
              azureSubscription: 'myapp-service-connection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              addSpnToEnvironment: true
              inlineScript: |
                az login --service-principal \
                  --username $servicePrincipalId \
                  --federated-token $idToken \
                  --tenant $tenantId
                az account set --subscription abacfdae-513e-452c-89e2-539ebce94192
                az group create --name rg-tfstate --location eastus --output none
                az storage account create \
                  --name stmyapptfstate001 \
                  --resource-group rg-tfstate \
                  --location eastus \
                  --sku Standard_LRS \
                  --output none
                az storage container create \
                  --name tfstate \
                  --account-name stmyapptfstate001 \
                  --auth-mode login \
                  --output none
          - task: TerraformInstaller@1
            inputs:
              terraformVersion: '1.7.5'
          - task: TerraformTaskV4@4
            displayName: 'Terraform Init'
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: '$(System.DefaultWorkingDirectory)/infra'
              backendServiceArm: 'myapp-service-connection'
              backendAzureRmResourceGroupName: 'rg-tfstate'
              backendAzureRmStorageAccountName: 'stmyapptfstate001'
              backendAzureRmContainerName: 'tfstate'
              backendAzureRmKey: 'myapp.terraform.tfstate'
          - task: TerraformTaskV4@4
            displayName: 'Terraform Apply'
            inputs:
              provider: 'azurerm'
              command: 'apply'
              workingDirectory: '$(System.DefaultWorkingDirectory)/infra'
              environmentServiceNameAzureRM: 'myapp-service-connection'
              commandOptions: '-auto-approve'

  - stage: Build
    dependsOn: Infrastructure
    jobs:
      - job: BuildApp
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: DotNetCoreCLI@2
            inputs:
              command: 'publish'
              publishWebProjects: true
              projects: 'MyApp.Web/MyApp.Web.csproj'
              arguments: '--configuration Release --output $(Build.ArtifactStagingDirectory)'
          - publish: $(Build.ArtifactStagingDirectory)
            artifact: drop

  - stage: DeployToStaging
    dependsOn: Build
    jobs:
      - job: DeployStagingSlot
        pool:
          vmImage: ubuntu-latest
        steps:
          - download: current
            artifact: drop
          - task: AzureWebApp@1
            inputs:
              azureSubscription: 'myapp-service-connection'
              appType: 'webAppLinux'
              appName: 'app-myapp-prod'
              slotName: 'staging'
              package: '$(Pipeline.Workspace)/drop/**/*.zip'

  - stage: ValidateStaging
    dependsOn: DeployToStaging
    jobs:
      - job: SmokeTest
        pool:
          vmImage: ubuntu-latest
        steps:
          - script: |
              curl -f https://app-myapp-prod-staging.azurewebsites.net/health || exit 1
            displayName: 'Smoke test staging slot'

  - stage: SwapToProduction
    dependsOn: ValidateStaging
    condition: succeeded()
    jobs:
      - deployment: SlotSwap
        environment: 'production'
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureAppServiceManage@0
                  inputs:
                    azureSubscription: 'myapp-service-connection'
                    action: 'Swap Slots'
                    webAppName: 'app-myapp-prod'
                    resourceGroupName: 'rg-myapp-prod'
                    sourceSlot: 'staging'
