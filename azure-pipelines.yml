          #         --image myapp-web:latest \
          #         --file Dockerfile \
          #         .

  - stage: Deploy
    dependsOn: Build
    jobs:
      # ── Job 1: Deploy to App Service ───────────────────────────────────
      - deployment: DeployToAppService
        displayName: 'Deploy to App Service'
        environment: 'production'
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: drop
                - task: AzureWebApp@1
                  displayName: 'Deploy to App Service'
                  inputs:
                    azureSubscription: 'myapp-service-connection'
                    appType: 'webAppLinux'
                    appName: 'app-myapp-sid'
                    package: '$(Pipeline.Workspace)/drop/**/*.zip'

      # ── Job 2: Deploy to AKS ───────────────────────────────────────────
      # Disabled while deploy_aks = false — AKS cluster does not exist.
      # Re-enable when deploy_aks is toggled back to true.
