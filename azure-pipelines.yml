          #     SONAR_TOKEN: $(SONAR_TOKEN)

          # ── .NET publish (for App Service deployment) ──────────────────
          - task: DotNetCoreCLI@2
            displayName: 'dotnet publish'
            inputs:
              command: 'publish'
              publishWebProjects: true
              projects: 'MyApp.Web/MyApp.Web.csproj'
              arguments: '--configuration Release --output $(Build.ArtifactStagingDirectory)'
          - publish: $(Build.ArtifactStagingDirectory)
            artifact: drop

          # ── Docker build and push (for AKS deployment) ────────────────
          # Disabled while deploy_aks = false — ACR does not exist.
          # Re-enable when deploy_aks is toggled back to true.
