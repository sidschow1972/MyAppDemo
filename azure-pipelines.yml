trigger:
  branches:
    include:
      - main

stages:
  - stage: Infrastructure
    jobs:

      # ── Job 1: Plan ────────────────────────────────────────────────
      # Runs terraform plan and saves the plan file as a pipeline
      # artifact. The human reviewer checks this job's logs to see
      # exactly what Terraform intends to create/change/destroy before
      # deciding whether to approve.
      - job: TerraformPlan
        displayName: 'Terraform Plan'
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: TerraformInstaller@1
            inputs:
              terraformVersion: '1.7.5'

          - task: TerraformTaskV4@4
            displayName: 'Terraform Init'
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: '$(System.DefaultWorkingDirectory)/infra'
              backendServiceArm: 'myapp-service-connection'
              backendAzureRmResourceGroupName: 'rg-tfstate'
              backendAzureRmStorageAccountName: 'stmyapptfstatesid'
              backendAzureRmContainerName: 'tfstate'
              backendAzureRmKey: 'myapp.terraform.tfstate'

          - task: TerraformTaskV4@4
            displayName: 'Terraform Plan'
            inputs:
              provider: 'azurerm'
              command: 'plan'
              workingDirectory: '$(System.DefaultWorkingDirectory)/infra'
              environmentServiceNameAzureRM: 'myapp-service-connection'
              # -out saves the plan to a binary file so Apply executes
              # exactly what was reviewed — no drift between plan and apply.
              commandOptions: '-out=$(System.DefaultWorkingDirectory)/infra/tfplan'

          # Publish the binary plan file so the Apply job can download it.
          - publish: '$(System.DefaultWorkingDirectory)/infra/tfplan'
            artifact: terraform-plan
            displayName: 'Publish plan artifact'

      # ── Job 2: Approve ─────────────────────────────────────────────
      # Agentless job (pool: server) — no VM needed, runs inside
      # Azure DevOps itself. Pauses the pipeline and sends an email
      # to the notifyUsers address. The reviewer clicks the link in
      # the email (or opens the pipeline run in the portal) and
      # clicks Approve or Reject. Pipeline resumes only on Approve.
      # Times out and auto-rejects after 24 hours if no action taken.
      - job: WaitForApproval
        displayName: 'Review & Approve Terraform Plan'
        dependsOn: TerraformPlan
        pool: server
        steps:
          - task: ManualValidation@0
            displayName: 'Manual approval gate'
            inputs:
              notifyUsers: 'sidhartha.choudhury@hotmail.com'
              instructions: |
                Review the Terraform plan output in the TerraformPlan job logs above.
                Approve to apply the changes to Azure. Reject to abort the pipeline.
              timeoutInMinutes: 1440

      # ── Job 3: Apply ───────────────────────────────────────────────
      # Only runs after the approval gate passes. Downloads the exact
      # plan file that was reviewed and applies it. No -auto-approve
      # flag needed because we pass the pre-computed plan file directly.
      - job: TerraformApply
        displayName: 'Terraform Apply'
        dependsOn: WaitForApproval
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: TerraformInstaller@1
            inputs:
              terraformVersion: '1.7.5'

          - task: TerraformTaskV4@4
            displayName: 'Terraform Init'
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: '$(System.DefaultWorkingDirectory)/infra'
              backendServiceArm: 'myapp-service-connection'
              backendAzureRmResourceGroupName: 'rg-tfstate'
              backendAzureRmStorageAccountName: 'stmyapptfstatesid'
              backendAzureRmContainerName: 'tfstate'
              backendAzureRmKey: 'myapp.terraform.tfstate'

          # Download the plan artifact published by TerraformPlan job.
          - download: current
            artifact: terraform-plan
            displayName: 'Download plan artifact'

          - task: TerraformTaskV4@4
            displayName: 'Terraform Apply'
            inputs:
              provider: 'azurerm'
              command: 'apply'
              workingDirectory: '$(System.DefaultWorkingDirectory)/infra'
              environmentServiceNameAzureRM: 'myapp-service-connection'
              # Apply the saved plan file — not a fresh plan.
              # This guarantees exactly what you reviewed gets deployed.
              commandOptions: '$(Pipeline.Workspace)/terraform-plan/tfplan'

  - stage: Build
    dependsOn: Infrastructure
    jobs:
      - job: BuildApp
        pool:
          vmImage: ubuntu-latest
        steps:
          # SonarCloud analysis — disabled, re-enable when ready
          # - script: |
          #     dotnet tool install --global dotnet-sonarscanner
          #     dotnet sonarscanner begin \
          #       /k:"sidschow1972_MyAppDemo" \
          #       /o:"sidschow1972" \
          #       /d:sonar.host.url="https://sonarcloud.io" \
          #       /d:sonar.token="$SONAR_TOKEN"
          #     dotnet build MyApp.Web/MyApp.Web.csproj --configuration Release
          #     dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"
          #   displayName: 'SonarCloud analysis'
          #   env:
          #     SONAR_TOKEN: $(SONAR_TOKEN)

          # ── .NET publish (for App Service deployment) ──────────────────
          - task: DotNetCoreCLI@2
            displayName: 'dotnet publish'
            inputs:
              command: 'publish'
              publishWebProjects: true
              projects: 'MyApp.Web/MyApp.Web.csproj'
              arguments: '--configuration Release --output $(Build.ArtifactStagingDirectory)'
          - publish: $(Build.ArtifactStagingDirectory)
            artifact: drop

          # ── Docker build and push (for AKS deployment) ────────────────
          # az acr build sends the source context to ACR, which builds and
          # pushes the image server-side — no Docker daemon needed on the agent,
          # and no separate Docker Registry service connection required.
          - task: AzureCLI@2
            displayName: 'Build and push Docker image to ACR'
            inputs:
              azureSubscription: 'myapp-service-connection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az acr build \
                  --registry acrmyappsid \
                  --image myapp-web:$(Build.BuildId) \
                  --image myapp-web:latest \
                  --file Dockerfile \
                  .

  - stage: Deploy
    dependsOn: Build
    jobs:
      # ── Job 1: Deploy to App Service ───────────────────────────────────
      - deployment: DeployToAppService
        displayName: 'Deploy to App Service'
        environment: 'production'
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: drop
                - task: AzureWebApp@1
                  displayName: 'Deploy to App Service'
                  inputs:
                    azureSubscription: 'myapp-service-connection'
                    appType: 'webAppLinux'
                    appName: 'app-myapp-sid'
                    package: '$(Pipeline.Workspace)/drop/**/*.zip'

      # ── Job 2: Deploy to AKS ───────────────────────────────────────────
      # Uses the Azure CLI to:
      #   1. Get AKS credentials into the agent's kubeconfig
      #   2. Stamp the build ID into the deployment manifest
      #   3. Apply all K8s manifests (Deployment, Service, HPA)
      - job: DeployToAKS
        displayName: 'Deploy to AKS'
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: AzureCLI@2
            displayName: 'Deploy to AKS'
            inputs:
              azureSubscription: 'myapp-service-connection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                # Get kubectl credentials for the AKS cluster
                az aks get-credentials \
                  --resource-group rg-myapp-prod \
                  --name aks-myapp-prod \
                  --admin \
                  --overwrite-existing

                # Replace __BUILD_ID__ placeholder in deployment.yaml with
                # the actual build number so the cluster pulls the right image.
                sed -i "s/__BUILD_ID__/$(Build.BuildId)/g" k8s/deployment.yaml

                # Apply manifests — kubectl is idempotent:
                # first run creates resources, subsequent runs update them.
                kubectl apply -f k8s/deployment.yaml
                kubectl apply -f k8s/service.yaml
                kubectl apply -f k8s/hpa.yaml

                # Wait for the rollout to complete (or fail within 3 minutes)
                kubectl rollout status deployment/myapp-web --timeout=3m

  - stage: Validate
    dependsOn: Deploy
    jobs:
      - job: SmokeTest
        pool:
          vmImage: ubuntu-latest
        steps:
          # Smoke test App Service
          - script: |
              for i in {1..10}; do
                echo "Attempt $i..."
                curl -f https://app-myapp-sid.azurewebsites.net/health && exit 0
                sleep 15
              done
              exit 1
            displayName: 'Smoke test App Service'

          # Smoke test AKS — get the LoadBalancer IP and hit /health
          - task: AzureCLI@2
            displayName: 'Smoke test AKS'
            inputs:
              azureSubscription: 'myapp-service-connection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az aks get-credentials \
                  --resource-group rg-myapp-prod \
                  --name aks-myapp-prod \
                  --admin \
                  --overwrite-existing

                # Wait for the LoadBalancer external IP to be assigned
                echo "Waiting for external IP..."
                for i in {1..20}; do
                  IP=$(kubectl get svc myapp-web-svc \
                    -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null)
                  if [ -n "$IP" ]; then
                    echo "External IP: $IP"
                    curl -f http://$IP/health && exit 0
                  fi
                  echo "Attempt $i — IP not ready yet, waiting..."
                  sleep 15
                done
                exit 1

