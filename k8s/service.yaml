apiVersion: v1
kind: Service
metadata:
  name: myapp-web-svc
  namespace: default
spec:
  # LoadBalancer provisions an Azure public load balancer with a public IP.
  # Traffic flow: Internet → Azure LB → Kubernetes Service → Pod (port 8080)
  # The public IP is assigned by Azure after a minute or two.
  # Run: kubectl get svc myapp-web-svc  to see the EXTERNAL-IP once assigned.
  type: LoadBalancer
  selector:
    app: myapp-web   # routes to pods with this label (set in deployment.yaml)
  ports:
    - name: http
      port: 80        # port the load balancer listens on (public)
      targetPort: 8080 # port the container listens on (internal)
