apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: myapp-web-hpa
  namespace: default
spec:
  # Points at the Deployment to scale
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: myapp-web

  minReplicas: 1   # Never go below 1 pod (app always available)
  maxReplicas: 2   # Never exceed 2 pods (matches your max pod requirement)

  metrics:
    # ── CPU scaling ────────────────────────────────────────────────────────
    # Triggers a scale-out when average CPU across all pods exceeds 70%
    # of their CPU limit (500m). 70% of 500m = 350m of active CPU usage.
    # Example: 1 pod using 360m → HPA adds a second pod to spread the load.
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

    # ── Memory scaling ─────────────────────────────────────────────────────
    # Triggers a scale-out when average memory across all pods exceeds 80%
    # of their memory limit (512Mi). 80% of 512Mi = ~409Mi.
    # Unlike CPU, memory pressure doesn't recover by itself — scaling out
    # distributes the load across more pods before OOM kills occur.
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
